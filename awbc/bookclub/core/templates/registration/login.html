{% extends "core/base.html" %}

{% block content %}

<div class="auth-container">
    <h1 class="auth-title">Welcome Back</h1>

    <form method="POST" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="auth-button">Log In</button>
    </form>

    <p class="auth-footer">
        Need an account?
        <a href="{% url 'signup' %}">Create one</a>
    </p>
</div>

{% endblock %}

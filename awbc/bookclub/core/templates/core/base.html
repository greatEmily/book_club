{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AWBC</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/base.css' %}">
    {% block extra_head %}{% endblock %}
</head>

<body>

<!-- NAV BAR -->
<div class="navbar">
    <div class="navbar-title">Arlington Women's Book Club</div>

    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>

<!-- SLIDE-OUT MENU -->
<div id="sideMenu" class="side-menu">
    {% if user.is_authenticated %}
        <form method="POST" action="{% url 'logout' %}" class="logout-form">
            {% csrf_token %}
            <button type="submit" class="action-button">Log out</button>
        </form>
    {% else %}
        <a href="/accounts/login/" class="action-button">Login</a>
    {% endif %}

    <!-- Future links -->
    <a href="#">Polls</a>
    <a href="#">Past Meetings</a>
    <a href="#">My Profile</a>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        window.toggleMenu = function () {
            const menu = document.getElementById("sideMenu");
            menu.classList.toggle("open");
        };
    });
</script>

{% block content %}{% endblock %}

</body>
</html>
